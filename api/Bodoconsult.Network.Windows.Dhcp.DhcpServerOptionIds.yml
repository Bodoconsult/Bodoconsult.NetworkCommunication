  assemblies:
  - Bodoconsult.Network.Windows
  namespace: Bodoconsult.Network.Windows.Dhcp
  summary: >-
    The router option specifies a list of IP addresses for routers on the
     client's subnet.  Routers SHOULD be listed in order of preference.
    The code for the router option is 3.  The minimum length for the
     router option is 4 octets, and the length MUST always be a multiple of 4. See [RFC2132]
  example: []
  syntax:
    content: >-
      [DhcpServerOptionIdType(DhcpServerOptionIdTypes.IpAddressList)]

      Router = 3
    return:
      type: Bodoconsult.Network.Windows.Dhcp.DhcpServerOptionIds
    content.vb: >-
      <DhcpServerOptionIdType(DhcpServerOptionIdTypes.IpAddressList)>

      Router = 3
