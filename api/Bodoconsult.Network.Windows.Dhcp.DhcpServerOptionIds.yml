    path: src/Bodoconsult.Network.Windows/Dhcp/DhcpServerOptionIds.cs
    startLine: 26
  assemblies:
  - Bodoconsult.Network.Windows
  namespace: Bodoconsult.Network.Windows.Dhcp
  summary: >-
    The subnet mask option specifies the client's subnet mask as per RFC 950.

    If both the subnet mask and the router option are specified in a DHCP
     reply, the subnet mask option MUST be first.
     The code for the subnet mask option is 1, and its length is 4 octets. See [RFC2132]
  example: []
  syntax:
    content: >-
      [DhcpServerOptionIdType(DhcpServerOptionIdTypes.IpAddress)]

      SubnetMask = 1
    return:
      type: Bodoconsult.Network.Windows.Dhcp.DhcpServerOptionIds
    content.vb: >-
      <DhcpServerOptionIdType(DhcpServerOptionIdTypes.IpAddress)>

      SubnetMask = 1
  attributes:
