    startLine: 306
  assemblies:
  - Bodoconsult.Network.Windows
  namespace: Bodoconsult.Network.Windows.Dhcp
  summary: >-
    This option specifies a list of static routes that the client should

    install in its routing cache.  If multiple routes to the same

    destination are specified, they are listed in descending order of

    priority.

    The routes consist of a list of IP address pairs.  The first address

    is the destination address, and the second address is the router for

    the destination.

    The default route (0.0.0.0) is an illegal destination for a static

    route. See <xref href="Bodoconsult.Network.Windows.Dhcp.DhcpServerOptionIds.Router" data-throw-if-not-resolved="false"></xref> for information about the router option.

    The code for this option is 33.  The minimum length of this option is

    8, and the length MUST be a multiple of 8. See [RFC2132]
  example: []
  syntax:
    content: >-
      [DhcpServerOptionIdType(DhcpServerOptionIdTypes.IpAddressAndIpAddress)]

      [Obsolete("See RFC 3442")]

      StaticRouter = 33
    return:
      type: Bodoconsult.Network.Windows.Dhcp.DhcpServerOptionIds
    content.vb: >-
      <DhcpServerOptionIdType(DhcpServerOptionIdTypes.IpAddressAndIpAddress)>

      <Obsolete("See RFC 3442")>

      StaticRouter = 33
