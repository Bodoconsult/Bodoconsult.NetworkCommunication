      path: src/Bodoconsult.Network.Windows/Dhcp/DhcpServerFailoverState.cs
      branch: main
      repo: https://github.com/Bodoconsult/Bodoconsult.NetworkCommunication.git
    id: Normal
    path: src/Bodoconsult.Network.Windows/Dhcp/DhcpServerFailoverState.cs
    startLine: 22
  assemblies:
  - Bodoconsult.Network.Windows
  namespace: Bodoconsult.Network.Windows.Dhcp
  summary: Indicates that each server in the failover relationship can service DHCPDISCOVER messages and all other DHCP requests as defined in RFC2131. DHCPv4 servers in the NORMAL state can not service DHCPREQUEST/RENEWAL or DHCPREQUEST/REBINDING requests from the client set defined according to the load balancing algorithm in RFC3074. However, each server can service DHCPREQUEST/RENEWAL or DHCPDISCOVER/REBINDING requests from any client.
  example: []
  syntax:
    content: Normal = 3
    return:
      type: Bodoconsult.Network.Windows.Dhcp.DhcpServerFailoverState
