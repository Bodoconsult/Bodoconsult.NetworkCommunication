    startLine: 50
  assemblies:
  - Bodoconsult.Network.Windows
  namespace: Bodoconsult.Network.Windows.Dhcp
  summary: Indicates that the DHCPv4 server should wait for a time period equal to Maximum Client Lead Time (MCLT) before moving to the RECOVER_DONE state. The MCLT is the maximum time, in seconds, that one server can extend a lease for a client beyond the lease time known by the partner server.
  example: []
  syntax:
    content: RecoverWait = 10
    return:
      type: Bodoconsult.Network.Windows.Dhcp.DhcpServerFailoverState
