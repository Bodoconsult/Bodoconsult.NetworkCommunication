  type: Method
  source:
    remote:
      path: src/Bodoconsult.NetworkCommunication/OrderManagement/Processors/RequestStepProcessor.cs
      branch: main
      repo: https://github.com/Bodoconsult/Bodoconsult.NetworkCommunication.git
    id: ExecuteRequest
    path: src/Bodoconsult.NetworkCommunication/OrderManagement/Processors/RequestStepProcessor.cs
    startLine: 255
  assemblies:
  - Bodoconsult.NetworkCommunication
  namespace: Bodoconsult.NetworkCommunication.OrderManagement.Processors
  summary: Execute the request sending a message to the device and waiting for answers
  remarks: >-
    The execution of a request step consists of two major steps. Step 1 is sending a message to the device. Step 2 is waiting for the answer of the device. The device is normally responsive.
        A timelag between step1 and step2 may lead to failing device orders due to "lost" device messages. Therefore we start step 2 before step 1 is fired.
  example: []
  syntax:
    content: public IOrderExecutionResultState ExecuteRequest(IOutboundDataMessage message, IDeviceRequestSpec requestSpec)
    parameters:
    - id: message
      type: Bodoconsult.NetworkCommunication.Interfaces.IOutboundDataMessage
    - id: requestSpec
      type: Bodoconsult.NetworkCommunication.Interfaces.IDeviceRequestSpec
    return:
