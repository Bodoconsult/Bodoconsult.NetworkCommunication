  - Bodoconsult.Network.Windows
  namespace: Bodoconsult.Network.Windows.Dhcp
  summary: The DHCP client is put into the default quarantine state configured on the DHCP NAP server. When a network policy server (NPS) is unavailable, the DHCP client can be put in any of the states NOQUARANTINE, RESTRICTEDACCESS, or DROPPACKET, depending on the default setting on the DHCP NAP server.
  example: []
  syntax:
    content: DefaultQuarantineState = 5
    return:
      type: Bodoconsult.Network.Windows.Dhcp.DhcpServerClientQuarantineStatuses
