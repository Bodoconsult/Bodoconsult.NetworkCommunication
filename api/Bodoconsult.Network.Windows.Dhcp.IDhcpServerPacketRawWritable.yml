  summary: Attempts to increase or decrease the packet buffer at the <code class="paramref">index</code> by the <code class="paramref">adjustmentAmount</code>.
  example: []
  syntax:
    content: bool TryAdjustBuffer(int index, int adjustmentAmount)
    parameters:
    - id: index
      type: System.Int32
      description: The buffer index where the adjustment should be made.
    - id: adjustmentAmount
      type: System.Int32
      description: The amount to adjust the buffer by. Positive numbers increase the buffer, negative numbers shrink the buffer.
    return:
      type: System.Boolean
      description: true if the adjustment was successful
    content.vb: Function TryAdjustBuffer(index As Integer, adjustmentAmount As Integer) As Boolean
