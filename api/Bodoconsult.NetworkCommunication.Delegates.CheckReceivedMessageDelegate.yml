  name: CheckReceivedMessageDelegate
  nameWithType: CheckReceivedMessageDelegate
  fullName: Bodoconsult.NetworkCommunication.Delegates.CheckReceivedMessageDelegate
  type: Delegate
  source:
    remote:
      path: src/Bodoconsult.NetworkCommunication/Delegates/CommDelegates.cs
      branch: main
      repo: https://github.com/Bodoconsult/Bodoconsult.NetworkCommunication.git
    id: CheckReceivedMessageDelegate
    path: src/Bodoconsult.NetworkCommunication/Delegates/CommDelegates.cs
    startLine: 202
  assemblies:
  - Bodoconsult.NetworkCommunication
  namespace: Bodoconsult.NetworkCommunication.Delegates
  summary: >-
    Check if a received message is the expected answer to the request.

    If the message is the requested answer from the device the properties <xref href="Bodoconsult.NetworkCommunication.Interfaces.IRequestAnswer.WasReceived" data-throw-if-not-resolved="false"></xref>

    and <xref href="Bodoconsult.NetworkCommunication.Interfaces.IRequestAnswer.ReceivedMessage" data-throw-if-not-resolved="false"></xref> are set to true and the received message.
  example: []
  syntax:
    content: public delegate bool CheckReceivedMessageDelegate(IRequestAnswer requestAnswer, IOutboundDataMessage sentMessage, IInboundDataMessage receivedMessage, IList<string> errors)
    parameters:
    - id: requestAnswer
      type: Bodoconsult.NetworkCommunication.Interfaces.IRequestAnswer
    - id: sentMessage
      type: Bodoconsult.NetworkCommunication.Interfaces.IOutboundDataMessage
      description: The message sent from the request to the device
    - id: receivedMessage
      type: Bodoconsult.NetworkCommunication.Interfaces.IInboundDataMessage
      description: A received message from the device
    - id: errors
      type: System.Collections.Generic.IList{System.String}
      description: List with error messages to fill
    return:
      type: System.Boolean
      description: True if the message was as expected as answer of the sent message else false
    content.vb: Public Delegate Function CheckReceivedMessageDelegate(requestAnswer As IRequestAnswer, sentMessage As IOutboundDataMessage, receivedMessage As IInboundDataMessage, errors As IList(Of String)) As Boolean
